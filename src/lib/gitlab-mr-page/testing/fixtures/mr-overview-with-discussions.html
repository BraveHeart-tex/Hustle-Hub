<!doctype html>
<html>
  <body>
    <main>
      <h1 data-testid="title-content">Example merge request</h1>
      <section id="notes-list">
        <article
          class="discussion"
          data-discussion-id="discussion-1"
          data-discussion-resolved="false"
          data-testid="discussion-content"
        >
          <ol>
            <li data-testid="noteable-note-container">
              <div class="timeline-avatar">
                <a class="gl-avatar-link" data-user-id="100" href="/ada">
                  <img class="gl-avatar" src="/avatar.png" alt="Ada Lovelace" />
                </a>
              </div>
              <span data-testid="author-name">Ada Lovelace</span>
              <time datetime="2026-01-01T00:00:00Z">Jan 1</time>
              <div class="note-text md"><p>First comment</p></div>
            </li>
            <li data-testid="noteable-note-container">
              <span data-testid="author-name">Grace Hopper</span>
              <div class="note-text md"><p>Reply</p></div>
            </li>
          </ol>
        </article>
      </section>
    </main>
  </body>
</html>
